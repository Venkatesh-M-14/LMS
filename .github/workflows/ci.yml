name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  JWT_ACCESS_SECRET: ci-only-secret-0123456789abcdef0123456789abcdef

jobs:
  checks:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @academy/api db:generate
      - run: pnpm build
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test

  e2e:
    name: End-to-end (Playwright)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: academy
          POSTGRES_PASSWORD: academy
          POSTGRES_DB: academy
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U academy -d academy"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Configure API environment
        run: |
          cat > apps/api/.env <<EOF
          NODE_ENV=development
          PORT=4000
          DATABASE_URL=postgresql://academy:academy@localhost:5432/academy?schema=public
          REDIS_URL=redis://localhost:6379
          JWT_ACCESS_SECRET=$JWT_ACCESS_SECRET
          RATE_LIMIT_AUTH_PER_WINDOW=1000
          RATE_LIMIT_GLOBAL_PER_MIN=5000
          EOF
      - run: pnpm --filter @academy/shared build
      - run: pnpm --filter @academy/api db:generate
      - run: pnpm db:migrate:deploy
      - run: pnpm exec playwright install chromium --with-deps
      - run: pnpm e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
